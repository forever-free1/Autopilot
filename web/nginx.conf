server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;
  resolver 127.0.0.11 valid=10s ipv6=off;

  location /api/ {
    set $backend http://backend:8080;
    proxy_pass $backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
