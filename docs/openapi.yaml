openapi: 3.0.3
info:
  title: AutoPilot Backend API
  version: 0.1.0
  description: 智能座舱平台 Phase 1 API
servers:
  - url: http://localhost:8080/api/v1
paths:
  /auth/register:
    post:
      summary: 注册用户
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/Credentials'}
      responses:
        '201': {description: 注册成功}
        '409': {description: 用户名已存在}
  /auth/login:
    post:
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/Credentials'}
      responses:
        '200': {description: 登录成功}
        '401': {description: 用户名或密码错误}
  /vehicles:
    get:
      summary: 查询当前用户车辆
      security: [{bearerAuth: []}]
      responses:
        '200': {description: 车辆列表}
    post:
      summary: 添加车辆
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema: {$ref: '#/components/schemas/VehicleInput'}
      responses:
        '201': {description: 创建成功}
  /vehicles/{id}/status:
    get:
      summary: 查询车辆最新状态
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: integer}}
      responses:
        '200':
          description: 查询成功；X-Cache 响应头标识 HIT 或 MISS
        '404': {description: 车辆不存在或不属于当前用户}
  /agent/tasks:
    post:
      summary: 创建异步 Agent 任务
      security: [{bearerAuth: []}]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicle_id, command]
              properties:
                vehicle_id: {type: integer}
                command: {type: string, minLength: 2, maxLength: 500}
      responses:
        '202': {description: 任务已进入 RabbitMQ 队列}
        '503': {description: 队列暂不可用}
  /agent/tasks/{id}:
    get:
      summary: 查询任务状态与 Tool Trace
      security: [{bearerAuth: []}]
      parameters:
        - {name: id, in: path, required: true, schema: {type: string, format: uuid}}
      responses:
        '200': {description: 返回任务、执行结果和工具调用列表}
        '404': {description: 任务不存在或不属于当前用户}
components:
  securitySchemes:
    bearerAuth: {type: http, scheme: bearer, bearerFormat: JWT}
  schemas:
    Credentials:
      type: object
      required: [username, password]
      properties:
        username: {type: string, minLength: 3, maxLength: 64}
        password: {type: string, minLength: 8, maxLength: 72}
    VehicleInput:
      type: object
      required: [vehicle_model, vin]
      properties:
        vehicle_model: {type: string, maxLength: 80}
        vin: {type: string, minLength: 17, maxLength: 17}
